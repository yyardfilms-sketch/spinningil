<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>דיג חכם – חופי ישראל</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2230;
  --gold:#f0b429;--cyan:#00d4ff;--green:#00e676;
  --red:#ff5252;--orange:#ff9800;--text:#e8eaed;--muted:#8b949e;
  --border:#30363d;--yborder:#f0b42944;--cborder:#00d4ff33;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;direction:rtl;min-height:100vh;padding-bottom:60px}

.app-header{background:var(--bg2);border-bottom:2px solid var(--gold);padding:12px 16px 8px;text-align:center;position:sticky;top:0;z-index:500}
.app-title{font-size:19px;font-weight:800;color:var(--gold)}
.app-beach{font-size:13px;color:var(--cyan);margin-top:2px;min-height:18px}

.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:55px;z-index:499;overflow-x:auto}
.tab-bar::-webkit-scrollbar{height:0}
.tb{flex:0 0 auto;padding:9px 12px;font-size:12px;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
.tb.active{color:var(--gold);border-bottom-color:var(--gold)}

.page{display:none}.page.active{display:block}
.sec{background:var(--bg2);border:1px solid var(--yborder);border-radius:12px;margin:10px;padding:14px}
.sec-t{font-size:14px;font-weight:700;color:var(--cyan);margin-bottom:11px}

/* SELECTORS */
.lbl{font-size:11px;color:var(--muted);margin-bottom:6px;padding-right:8px;border-right:2px solid var(--red)}
.btn-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px}
.sbtn{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-weight:600;padding:8px 12px;cursor:pointer}
.sbtn:hover{border-color:var(--gold)}
.sbtn.active{background:var(--gold);color:#111;border-color:var(--gold)}
.bgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
@media(min-width:380px){.bgrid{grid-template-columns:repeat(3,1fr)}}
.bbtn{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:11px;font-weight:600;padding:8px 5px;cursor:pointer;text-align:center;line-height:1.3}
.bbtn:hover{border-color:var(--cyan)}
.bbtn.active{border-color:var(--cyan);background:#00d4ff15;color:var(--cyan)}
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:9px 12px 9px 32px;direction:rtl}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{outline:none;border-color:var(--cyan)}
.s-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}

/* MAP */
#mapContainer{height:380px;border-radius:10px;overflow:hidden;margin:0 10px 10px;border:1px solid var(--yborder)}
.leaflet-container{background:#0d1117!important}
.map-popup{font-family:'Segoe UI',Arial,sans-serif;direction:rtl;text-align:right;min-width:150px}
.map-popup h4{font-size:13px;font-weight:700;color:#f0b429;margin-bottom:4px}
.map-popup .pop-score{font-size:18px;font-weight:900;margin:2px 0}
.map-popup .pop-fish{font-size:11px;color:#8b949e;margin-top:3px}
.map-popup .pop-btn{display:block;margin-top:7px;background:#f0b429;color:#111;border:none;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;width:100%;text-align:center}

/* STATUS */
.status-banner{border-radius:8px;padding:10px 14px;text-align:center;font-size:14px;font-weight:700;margin-bottom:11px}
.s-opt{background:#00e67618;border:1.5px solid var(--green);color:var(--green)}
.s-good{background:#00d4ff18;border:1.5px solid var(--cyan);color:var(--cyan)}
.s-fair{background:#ff980018;border:1.5px solid var(--orange);color:var(--orange)}
.s-poor{background:#ff525218;border:1.5px solid var(--red);color:var(--red)}

/* COND CARDS */
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
@media(min-width:380px){.cgrid{grid-template-columns:repeat(4,1fr)}}
.cc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center}
.cc.hl{border-color:var(--cyan);background:#00d4ff0a}
.cc-i{font-size:19px;margin-bottom:2px}
.cc-v{font-size:15px;font-weight:700}
.cc-s{font-size:10px;color:var(--muted)}
.cc-l{font-size:10px;color:var(--muted);margin-top:4px}

/* HOURLY */
.tbl-w{overflow-x:auto;-webkit-overflow-scrolling:touch}
.htbl{width:100%;border-collapse:collapse;font-size:11px;min-width:480px}
.htbl th{background:var(--bg3);color:var(--muted);padding:7px 3px;text-align:center;font-weight:600;border-bottom:1px solid var(--border)}
.htbl td{padding:6px 3px;text-align:center;border-bottom:1px solid #ffffff07}
.htbl tr.now td{color:var(--cyan)}
.hrc{color:var(--cyan);font-weight:700;white-space:nowrap}
.wb{display:inline-block;border-radius:4px;padding:2px 5px;font-weight:700;font-size:10px;min-width:48px}
.wb-ok{background:#00e67620;color:var(--green)}
.wb-med{background:#ff980020;color:var(--orange)}
.wb-hi{background:#ff525220;color:var(--red)}
.wvc-ok{color:var(--green);font-weight:700}
.wvc-med{color:var(--orange);font-weight:700}
.wvc-bad{color:var(--red);font-weight:700}
.swell-badge{display:inline-block;background:#00d4ff15;color:var(--cyan);border-radius:3px;padding:1px 4px;font-size:9px}

/* POTENTIAL */
.pot-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #ffffff05}
.pot-hr{font-size:11px;color:var(--cyan);width:36px;flex-shrink:0}
.pot-bw{flex:1;background:var(--bg3);border-radius:3px;height:16px;overflow:hidden}
.pot-b{height:100%;border-radius:3px;display:flex;align-items:center;padding-right:4px}
.pot-b span{font-size:9px;font-weight:700;color:#111}
.pot-lbl{font-size:10px;width:50px}
.pot-tmp{font-size:10px;color:var(--muted);width:28px;text-align:center}

/* SCORE */
.sc-wrap{display:flex;flex-direction:column;align-items:center;padding:6px 0}
.sc-circ{position:relative;width:96px;height:96px;margin-bottom:7px}
.sc-circ svg{transform:rotate(-90deg)}
.sc-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;font-weight:900}
.sc-lbl{font-size:14px;font-weight:700;margin-bottom:3px}
.sc-time{font-size:11px;color:var(--muted);margin-bottom:9px}
.tip-box{background:var(--bg3);border-right:3px solid;border-radius:0 7px 7px 0;padding:9px 11px;font-size:11px;line-height:1.65;width:100%}

/* SUN/MOON */
.sun-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.sun-card{background:var(--bg3);border:1.5px solid var(--cborder);border-radius:9px;padding:10px;text-align:center}
.sun-card .si{font-size:17px}
.sun-card .st{font-size:21px;font-weight:700;margin:3px 0}
.sun-card .sl{font-size:10px;color:var(--muted)}
.moon-card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:11px;text-align:center}

/* WEEKLY */
.wk-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x mandatory}
.wk-scroll::-webkit-scrollbar{height:3px}
.wk-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.dc{flex:0 0 72px;background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;padding:8px 4px;text-align:center;cursor:pointer;scroll-snap-align:start}
.dc:hover{border-color:var(--cyan)}
.dc.active{border-color:var(--cyan);background:#00d4ff0f}
.dc-n{font-size:10px;color:var(--muted)}
.dc-d{font-size:9px;color:var(--muted);margin-bottom:4px}
.dc-i{font-size:18px;margin-bottom:2px}
.dc-w{font-size:9px;font-weight:700;background:var(--cborder);color:var(--cyan);border-radius:3px;padding:1px 3px;margin-top:2px}

/* FISH CARDS */
.fc{background:var(--bg3);border-radius:10px;padding:11px;margin-bottom:9px}
.fc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.fc-name{font-size:13px;font-weight:700}
.fc-badge{border-radius:5px;padding:3px 8px;font-size:10px;font-weight:700}
.fc-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:11px;margin-bottom:7px}
.fc-grid .k{color:var(--muted)}
.fc-tip{font-size:11px;border-right:2px solid;padding:5px 8px;border-radius:0 6px 6px 0;background:var(--bg2);line-height:1.55}
.season-pills{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.sp{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700}
.sp.on{background:#00e67620;color:var(--green)}
.sp.off{background:#ffffff08;color:var(--muted)}
.sp.cur{background:var(--green);color:#111}

/* INFO ROWS */
.ir{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #ffffff07;font-size:12px}
.ir .ik{color:var(--muted)}
.ir .iv{font-weight:600}
.tag{display:inline-block;background:#00d4ff15;color:var(--cyan);border-radius:4px;padding:2px 7px;font-size:11px;margin:2px}
.fish-list{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}

/* CHART */
.chart-w{background:var(--bg3);border-radius:7px;padding:9px 5px 5px;position:relative}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;padding:32px 16px;color:var(--muted)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:9px}
@keyframes spin{to{transform:rotate(360deg)}}
.info-note{font-size:10px;color:var(--muted);background:var(--bg3);border-radius:5px;padding:5px 8px;margin-top:5px;line-height:1.5}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">🎣 דיג חכם – חופי ישראל</div>
  <div class="app-beach" id="headerBeach">בחר חוף להתחיל</div>
</div>

<div class="tab-bar">
  <button class="tb active" onclick="showTab('select',this)">🗺️ בחר חוף</button>
  <button class="tb" onclick="showTab('now',this)">📡 עכשיו</button>
  <button class="tb" onclick="showTab('hourly',this)">🕐 שעתי</button>
  <button class="tb" onclick="showTab('potential',this)">🎯 פוטנציאל</button>
  <button class="tb" onclick="showTab('week',this)">📅 שבועי</button>
  <button class="tb" onclick="showTab('fish',this)">🐟 דגים</button>
  <button class="tb" onclick="showTab('info',this)">ℹ️ חוף</button>
</div>

<!-- SELECT PAGE -->
<div id="page-select" class="page active">
  <div class="sec">
    <div class="lbl">סגנון דיג:</div>
    <div class="btn-row">
      <button class="sbtn active" onclick="setStyle('shore',this)">🎣 מהחוף</button>
      <button class="sbtn" onclick="setStyle('boat',this)">⛵ סירה/קיאק</button>
    </div>
    <div class="lbl">אזור:</div>
    <div class="btn-row" id="regionBtns">
      <button class="sbtn" onclick="setRegion('north',this)">🏔️ צפון</button>
      <button class="sbtn" onclick="setRegion('haifa',this)">⚓ חיפה</button>
      <button class="sbtn" onclick="setRegion('sharon',this)">🌿 שרון</button>
      <button class="sbtn active" onclick="setRegion('center',this)">🏙️ מרכז</button>
      <button class="sbtn" onclick="setRegion('south',this)">☀️ דרום</button>
    </div>
    <div class="lbl">חיפוש:</div>
    <div class="search-wrap">
      <span class="s-ico">🔍</span>
      <input class="search-input" type="text" placeholder="הקלד שם חוף..." oninput="filterBeaches(this.value)" id="searchInput">
    </div>
    <div class="lbl" id="beachCountLbl">בחר חוף:</div>
    <div class="bgrid" id="beachGrid"></div>
  </div>
</div>

<!-- MAP PAGE (within select) - standalone map tab -->
<div id="page-map" class="page">
  <div class="sec" style="padding:10px">
    <div class="sec-t" style="margin-bottom:8px">🗺️ מפת כל החופים – לחץ על דגלון לבחירה</div>
    <div id="mapContainer"></div>
    <div class="info-note">💡 לחץ על דגלון לפרטי החוף. צבע = ציון דיג (ירוק=מצוין, צהוב=סביר, אדום=לא מומלץ). גרור/זום לניווט.</div>
  </div>
</div>

<!-- NOW PAGE -->
<div id="page-now" class="page">
  <div id="content-now"><div class="sec"><div class="loading"><div class="spinner"></div>בחר חוף תחילה</div></div></div>
</div>

<!-- HOURLY PAGE -->
<div id="page-hourly" class="page">
  <div id="content-hourly"><div class="sec"><div class="loading"><div class="spinner"></div>בחר חוף תחילה</div></div></div>
</div>

<!-- POTENTIAL PAGE -->
<div id="page-potential" class="page">
  <div id="content-potential"><div class="sec"><div class="loading"><div class="spinner"></div>בחר חוף תחילה</div></div></div>
</div>

<!-- WEEK PAGE -->
<div id="page-week" class="page">
  <div id="content-week"><div class="sec"><div class="loading"><div class="spinner"></div>בחר חוף תחילה</div></div></div>
</div>

<!-- FISH PAGE -->
<div id="page-fish" class="page">
  <div id="content-fish"><div class="sec"><div class="loading"><div class="spinner"></div>בחר חוף תחילה</div></div></div>
</div>

<!-- INFO PAGE -->
<div id="page-info" class="page">
  <div id="content-info"><div class="sec"><div class="loading"><div class="spinner"></div>בחר חוף תחילה</div></div></div>
</div>

<script>

  north:[

    {id:'nahariya_south',name:'נהריה דרום',lat:32.9980,lon:35.0880,fish:['דנים','אמנון'],structure:'חוף חולי',tip:'שקט ומשפחתי. בוקר מוקדם.'},
    {id:'betzet',name:'חוף בצת',lat:33.0670,lon:35.1100,fish:['דנים','בס'],structure:'סלעי טבעי מבודד',tip:'חוף נסתר – דגים לא מבועתים. שביל קצר.'},
    {id:'akko_old',name:'עכו – נמל עתיק',lat:32.9234,lon:35.0783,fish:['לוקוס','דנים','מוסר'],structure:'נמל עתיק + שרידים',tip:'מבנים עתיקים מתחת למים = בית דגים. מומלץ מאוד!'},

    {id:'haifa_hof_hadar',name:'הוף הדר',lat:32.7940,lon:34.9896,fish:['בס','פליימן','דנים'],structure:'חוף חולי + נמל',tip:'שוברי גלים דרומיים של הנמל.'},
    {id:'atlit',name:'עתלית',lat:32.6938,lon:34.9382,fish:['דנים','מוסר','לוקוס'],structure:'חוף + מצודה צלבנית',tip:'ליד שרידי המצודה הסלעית – מבנה מצוין.'},
    {id:'dor',name:'חוף דור',lat:32.6149,lon:34.9173,fish:['דנים','מוסר','אמנון'],structure:'איים קטנים + חול',tip:'הדיג טוב בין האיים. כדאי עם גרב.'},
    {id:'tantura',name:'תנתורה',lat:32.5996,lon:34.9116,fish:['דנים','מוסר','לוקוס'],structure:'ספינה טרופה + חול',tip:'ספינה טרופה = בית דגים מצוין!'},

// ════════════ SCORE ════════════════════════════════════
function fishScore(wind,wave,temp,pressure,isBoat){
  let waveScore,windScore,tempScore,pressScore;
  if(!isBoat){
    if(wave<0.15) waveScore=8;
    else if(wave<=0.5) waveScore=20;
    else if(wave<=0.9) waveScore=25;
    else if(wave<=1.4) waveScore=15;
    else if(wave<=2.0) waveScore=6;
    else waveScore=0;
  } else {
    if(wave<0.3) waveScore=12;
    else if(wave<=1.0) waveScore=22;
    else if(wave<=1.8) waveScore=18;
    else if(wave<=2.5) waveScore=8;
    else waveScore=0;
  }
  if(wind<3) windScore=10;
  else if(wind<=8) windScore=20;
  else if(wind<=16) windScore=25;
  else if(wind<=24) windScore=12;
  else if(wind<=35) windScore=4;
  else windScore=0;
  if(temp<8) tempScore=2;
  else if(temp<=14) tempScore=8;
  else if(temp<=20) tempScore=12;
  else if(temp<=30) tempScore=15;
  else if(temp<=36) tempScore=10;
  else tempScore=4;
  if(pressure<998) pressScore=0;
  else if(pressure<1005) pressScore=4;
  else if(pressure<=1018) pressScore=10;
  else pressScore=7;
  const total=waveScore+windScore+tempScore+pressScore;
  const n=Math.round(total/75*100);
  const adj=Math.round(n*0.88+(n>80?0:-5));
  return Math.min(97,Math.max(0,adj));
}

function scoreLabel(s){
  if(s>=80)return{text:'אידאלי 🔥',cls:'s-opt',color:'#00e676'};
  if(s>=65)return{text:'טוב מאוד ✅',cls:'s-opt',color:'#00e676'};
  if(s>=50)return{text:'טוב 👍',cls:'s-good',color:'#00d4ff'};
  if(s>=35)return{text:'סביר ⚠️',cls:'s-fair',color:'#ff9800'};
  return{text:'לא מומלץ ❌',cls:'s-poor',color:'#ff5252'};
}

// ════════════ SUN CALC (NOAA) ════════════════════════════
function sunCalc(lat_deg,lon_deg,date,tzOff){
  const a=Math.floor((14-(date.getMonth()+1))/12);
  const y=date.getFullYear()+4800-a;
  const m=(date.getMonth()+1)+12*a-3;
  const jdn=date.getDate()+Math.floor((153*m+2)/5)+365*y+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400)-32045;
  const jd=jdn-0.5;
  const T=(jd-2451545.0)/36525.0;
  const L0=((280.46646+36000.76983*T)%360+360)%360;
  const M=((357.52911+35999.05029*T-0.0001537*T*T)%360+360)%360;
  const Mr=M*Math.PI/180;
  const C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mr)+(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  const sunLon=L0+C;
  const omega=125.04-1934.136*T;
  const lam=sunLon-0.00569-0.00478*Math.sin(omega*Math.PI/180);
  const eps0=23+26/60+21.448/3600-(46.815/3600)*T;
  const eps=eps0+0.00256*Math.cos(omega*Math.PI/180);
  const decl=Math.asin(Math.sin(eps*Math.PI/180)*Math.sin(lam*Math.PI/180));
  const y_=Math.tan(eps*Math.PI/360)**2;
  const EqT=4*(180/Math.PI)*(y_*Math.sin(2*L0*Math.PI/180)-2*0.016708634*Math.sin(Mr)+4*0.016708634*y_*Math.sin(Mr)*Math.cos(2*L0*Math.PI/180)-0.5*y_*y_*Math.sin(4*L0*Math.PI/180)-1.25*0.016708634**2*Math.sin(2*Mr));
  const lat_r=lat_deg*Math.PI/180;
  const noonUTC=720-4*lon_deg-EqT;
  function ha(z){const c=Math.cos(z*Math.PI/180)/(Math.cos(lat_r)*Math.cos(decl))-Math.tan(lat_r)*Math.tan(decl);return(180/Math.PI)*Math.acos(Math.max(-1,Math.min(1,c)));}
  function fmtUTC(utcMin){const loc=((utcMin+tzOff*60)%1440+1440)%1440;return fmt2(Math.floor(loc/60),loc%60);}
  return{dawn:fmtUTC(noonUTC-4*ha(96)),sunrise:fmtUTC(noonUTC-4*ha(90.833)),sunset:fmtUTC(noonUTC+4*ha(90.833)),dusk:fmtUTC(noonUTC+4*ha(96))};
}

// ════════════ MAP ════════════════════════════════════════
function initMap(){
  if(leafMap) return;
  leafMap=L.map('mapContainer',{zoomControl:true}).setView([32.0,34.8],8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',maxZoom:18
  }).addTo(leafMap);
  // Dark overlay
  renderMapMarkers();
}

function renderMapMarkers(scoreMap={}){
  beachMarkers.forEach(m=>m.remove());
  beachMarkers=[];
  ALL_BEACHES().forEach(b=>{
    const sc=scoreMap[b.id]||null;
    const color=sc===null?'#f0b429':sc>=65?'#00e676':sc>=40?'#f0b429':'#ff5252';
    const icon=L.divIcon({
      html:`<div style="width:28px;height:28px;background:${color};border:2px solid #0d1117;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;box-shadow:0 2px 6px #000a">
        ${sc!==null?`<span style="font-size:9px;font-weight:900;color:#111">${sc}</span>`:'🎣'}
      </div>`,
      className:'',iconSize:[28,28],iconAnchor:[14,14]
    });
    const marker=L.marker([b.lat,b.lon],{icon}).addTo(leafMap);
    const slTxt=sc!==null?scoreLabel(sc).text:'טוען...';
    marker.bindPopup(`
      <div class="map-popup">
        <h4>🎣 ${b.name}</h4>
        ${sc!==null?`<div class="pop-score" style="color:${color}">${sc}/100 – ${slTxt}</div>`:''}
        <div class="pop-fish">${b.fish.slice(0,3).join(' • ')}</div>
        <div class="pop-fish" style="margin-top:3px">📍 ${b.structure}</div>
        <button class="pop-btn" onclick="selectBeachById('${b.id}')">פתח נתוני חוף ←</button>
      </div>
    `,{maxWidth:200});
    beachMarkers.push(marker);
  });
}

  const beaches=ALL_BEACHES();
  for(let i=0;i<beaches.length;i+=4){
    const batch=beaches.slice(i,i+4);
    await Promise.all(batch.map(async b=>{
      try{
        const d=await fetchWeather(b);
        const now=new Date();
        let ci=d.hourly.time.findIndex(t=>new Date(t)>=now);
        if(ci<0)ci=0;
        const sc=fishScore(
          Math.round(d.hourly.windspeed_10m[ci]),
          d.hourly.wave_height?.[ci]??0.5,
          Math.round(d.hourly.temperature_2m[ci]),
          Math.round(d.hourly.pressure_msl[ci]),
          curStyle==='boat'
        );
        scoreMap[b.id]=sc;
      }catch{}
    }));
  }
  renderMapMarkers(scoreMap);
}

// ════════════ UI ══════════════════════════════════════════
function showTab(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  // map tab is a special case
  if(name==='map'){
    document.getElementById('page-map').classList.add('active');
    btn.classList.add('active');
    setTimeout(()=>{
      initMap();
      loadAllScoresForMap();
    },50);
    return;
  }
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
}

function setStyle(s,btn){
  curStyle=s;
  document.querySelectorAll('.btn-row .sbtn').forEach(b=>{if(b.onclick?.toString().includes('setStyle'))b.classList.remove('active');});
  btn.classList.add('active');
  if(curBeach&&wxCache[curBeach.id]) renderAll(curBeach,wxCache[curBeach.id]);
}

function setRegion(r,btn){
  curRegion=r;
  document.querySelectorAll('#regionBtns .sbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').value='';
  renderBeachGrid(BEACHES[r]);
}

function filterBeaches(q){
  if(!q.trim()){renderBeachGrid(BEACHES[curRegion]);return;}
  const res=ALL_BEACHES().filter(b=>b.name.includes(q));
  document.getElementById('beachCountLbl').textContent=`נמצאו ${res.length} חופים:`;
  renderBeachGrid(res);
}

function renderBeachGrid(list){
  document.getElementById('beachCountLbl').textContent=`${list.length} חופים:`;
  document.getElementById('beachGrid').innerHTML=list.map(b=>
    `<button class="bbtn ${curBeach?.id===b.id?'active':''}" onclick="selectBeachById('${b.id}')">${b.name}</button>`
  ).join('');
}

function selectBeachById(id){
  curBeach=ALL_BEACHES().find(b=>b.id===id);
  document.querySelectorAll('.bbtn').forEach(b=>b.classList.toggle('active',b.textContent.trim()===curBeach.name));
  document.getElementById('headerBeach').textContent='📍 '+curBeach.name;
  loadBeach(curBeach);
  document.querySelectorAll('.tb')[1].click(); // go to "now" tab
}

// ════════════ WEATHER ════════════════════════════════════
async function fetchWeather(beach){
  if(wxCache[beach.id]) return wxCache[beach.id];
  const [fr,mr]=await Promise.all([
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${beach.lat}&longitude=${beach.lon}&hourly=temperature_2m,weathercode,windspeed_10m,winddirection_10m,pressure_msl&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum,windspeed_10m_max&timezone=Asia/Jerusalem&forecast_days=7`),
    fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${beach.lat}&longitude=${beach.lon}&hourly=wave_height,wave_period,swell_wave_height,swell_wave_period,wave_direction,sea_surface_temperature&daily=wave_height_max,wave_period_max&timezone=Asia/Jerusalem&forecast_days=7`)
  ]);
  const [f,m]=await Promise.all([fr.json(),mr.json()]);
  const d={
    hourly:{
      time:f.hourly.time,
      temperature_2m:f.hourly.temperature_2m,
      weathercode:f.hourly.weathercode,
      windspeed_10m:f.hourly.windspeed_10m,
      winddirection_10m:f.hourly.winddirection_10m,
      pressure_msl:f.hourly.pressure_msl,
      wave_height:m.hourly.wave_height,
      wave_period:m.hourly.wave_period,
      swell_wave_height:m.hourly.swell_wave_height,
      swell_wave_period:m.hourly.swell_wave_period,
      wave_direction:m.hourly.wave_direction,
      sea_surface_temperature:m.hourly.sea_surface_temperature,
    },
    daily:{
      time:f.daily.time,
      temperature_2m_max:f.daily.temperature_2m_max,
      temperature_2m_min:f.daily.temperature_2m_min,
      weathercode:f.daily.weathercode,
      precipitation_sum:f.daily.precipitation_sum,
      windspeed_10m_max:f.daily.windspeed_10m_max,
      wave_height_max:m.daily.wave_height_max,
      wave_period_max:m.daily.wave_period_max,
    }
  };
  wxCache[beach.id]=d;
  return d;
}

// ════════════ MAIN RENDER ════════════════════════════════
async function loadBeach(beach){
  ['now','hourly','potential','week','fish','info'].forEach(n=>{
    document.getElementById('content-'+n).innerHTML=`<div class="sec"><div class="loading"><div class="spinner"></div>טוען ${beach.name}...</div></div>`;
  });
  try{
    const d=await fetchWeather(beach);
    renderAll(beach,d);
  }catch(e){
    ['now','hourly','potential','week','fish','info'].forEach(n=>{
      document.getElementById('content-'+n).innerHTML=`<div class="sec" style="text-align:center;padding:28px"><div style="font-size:26px">⚠️</div><div style="color:var(--muted);margin-top:8px">${e.message}</div><button class="sbtn" style="margin-top:12px" onclick="loadBeach(curBeach)">נסה שוב</button></div>`;
    });
  }
}

  <div class="sec">
    <div class="sec-t">🌅 שעות אור – ${beach.name}</div>
    <div class="sun-grid">
      <div class="sun-card"><div class="si">🌄</div><div class="st">${sc2.dawn}</div><div class="sl">שחר (אור ראשון)</div></div>
      <div class="sun-card"><div class="si">☀️</div><div class="st">${sc2.sunrise}</div><div class="sl">זריחה</div></div>

  setTimeout(()=>drawChart(d,beach,isBoat),80);

  // ── WEEK ──────────────────────────────────────────────────
  const weekCards=d.daily.time.slice(0,7).map((t,i)=>{

// ── CHART ────────────────────────────────────────────────
function drawChart(d,beach,isBoat){
  const ctx=document.getElementById('waveChart');
  if(!ctx)return;
  if(waveChartInst){waveChartInst.destroy();waveChartInst=null;}
  const dayStr=new Date().toDateString();
  const labels=[],waves=[],swells=[],scores=[],sst=[];
  for(let h=0;h<24;h++){
    const idx=d.hourly.time.findIndex(t=>{const dt=new Date(t);return dt.toDateString()===dayStr&&dt.getHours()===h;});
    if(idx<0)continue;
    labels.push(`${f2(h)}:00`);
    waves.push(Math.round((d.hourly.wave_height?.[idx]??0.5)*100));
    swells.push(d.hourly.swell_wave_height?.[idx]!=null?Math.round(d.hourly.swell_wave_height[idx]*100):null);
    scores.push(fishScore(d.hourly.windspeed_10m[idx],d.hourly.wave_height?.[idx]??0.5,d.hourly.temperature_2m[idx],d.hourly.pressure_msl[idx],isBoat));
    sst.push(d.hourly.sea_surface_temperature?.[idx]!=null?Math.round(d.hourly.sea_surface_temperature[idx]*10)/10:null);
  }
  waveChartInst=new Chart(ctx,{
    data:{labels,datasets:[
      {type:'line',label:'גלים כולל (ס"מ)',data:waves,borderColor:'#00d4ff',backgroundColor:'#00d4ff18',fill:true,tension:0.4,pointRadius:0,yAxisID:'y'},
      {type:'line',label:'סוואל (ס"מ)',data:swells,borderColor:'#7c4dff',backgroundColor:'transparent',fill:false,tension:0.4,pointRadius:0,yAxisID:'y',borderDash:[3,3]},
      {type:'line',label:'פוטנציאל דיג',data:scores,borderColor:'#f0b429',backgroundColor:'transparent',fill:false,tension:0.4,pointRadius:0,yAxisID:'y2'},
      {type:'line',label:'טמפ\' מים °C',data:sst,borderColor:'#ff9800',backgroundColor:'transparent',fill:false,tension:0.3,pointRadius:0,yAxisID:'y3',borderWidth:1.5}
    ]},
    options:{responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#8b949e',font:{size:10}}},tooltip:{backgroundColor:'#1c2230',titleColor:'#00d4ff',bodyColor:'#e8eaed'}},
      scales:{
        x:{ticks:{color:'#8b949e',font:{size:9},maxTicksLimit:8,maxRotation:0},grid:{color:'#ffffff08'}},
        y:{position:'right',title:{display:true,text:'גלים ס"מ',color:'#00d4ff',font:{size:9}},ticks:{color:'#8b949e',font:{size:9}},grid:{color:'#ffffff08'}},
        y2:{position:'left',title:{display:true,text:'פוטנציאל',color:'#f0b429',font:{size:9}},ticks:{color:'#8b949e',font:{size:9}},grid:{display:false},min:0,max:100},
        y3:{position:'right',title:{display:true,text:'SST°C',color:'#ff9800',font:{size:9}},ticks:{color:'#8b949e',font:{size:9}},grid:{display:false},display:sst.some(v=>v!=null),offset:true}
      }
    }
  });
}

// ── DAY DETAIL ───────────────────────────────────────────
function renderDayDetail(d,i,beach,isBoat){
  const dt=new Date(d.daily.time[i]+'T12:00:00');
  const wv=d.daily.wave_height_max?.[i]??0.5;
  const ws=Math.round(d.daily.windspeed_10m_max[i]);
  const wc=d.daily.weathercode[i];
  const mx=Math.round(d.daily.temperature_2m_max[i]);
  const mn=Math.round(d.daily.temperature_2m_min[i]);
  const rain=Math.round((d.daily.precipitation_sum[i]??0)*10)/10;
  const per=Math.round(d.daily.wave_period_max?.[i]??6);
  const sc=fishScore(ws,wv,(mx+mn)/2,1010,isBoat);
  const sl=scoreLabel(sc);
  return`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:11px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
      <div><div style="font-size:14px;font-weight:700">${DAYS[dt.getDay()]}, ${dt.getDate()}/${dt.getMonth()+1}</div>
      <div style="font-size:11px;color:var(--muted)">${wmoIcon(wc)} ${wmoTxt(wc)}</div></div>
      <div style="text-align:center"><div style="font-size:22px;font-weight:900;color:${sl.color}">${sc}</div>
      <div style="font-size:10px;color:${sl.color}">${sl.text}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:11px;text-align:center">
      <div><div style="color:var(--muted);font-size:9px">🌊 גלים</div><div style="font-weight:700;color:${wv<1?'#00e676':wv<2?'#ff9800':'#ff5252'}">${Math.round(wv*100)}ס"מ</div></div>
      <div><div style="color:var(--muted);font-size:9px">⏱ תקופה</div><div style="font-weight:700">${per}ש"ג</div></div>
      <div><div style="color:var(--muted);font-size:9px">💨 רוח</div><div style="font-weight:700">${ws}קמ"ש</div></div>
      <div><div style="color:var(--muted);font-size:9px">🌡️ אוויר</div><div style="font-weight:700">${mn}°–${mx}°C</div></div>
      <div><div style="color:var(--muted);font-size:9px">🌧️ גשם</div><div style="font-weight:700">${rain}מ"מ</div></div>
      <div><div style="color:var(--muted);font-size:9px">🌤 מזג</div><div style="font-weight:700">${wmoTxt(wc)}</div></div>
    </div>
  </div>`;
}

function selectDay(i,btn){
  document.querySelectorAll('.dc').forEach((b,idx)=>b.classList.toggle('active',idx===i));
  if(window._wd) document.getElementById('dayDetail').innerHTML=renderDayDetail(window._wd,i,window._wb,window._wboat);
}

// ── FISH TAB ─────────────────────────────────────────────
function renderFish(beach,now,moonAge,moonPct){
  const m0=now.getMonth();
  const isNew=moonPct<25,isFull=moonPct>75;
  const MONTH_NAMES=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

  function moonBonus(f){
    if(f.moonBest==='new'&&isNew) return{txt:'🌑 מולד ירח – תנאי ירח מושלמים לסוג זה!',good:true};
    if(f.moonBest==='full'&&isFull) return{txt:'🌕 ירח מלא – תנאי ירח מושלמים!',good:true};
    if(f.moonBest==='new'&&isFull) return{txt:'🌕 ירח מלא – פחות אידאלי לסוג זה',good:false};
    return null;
  }

  function fishCard(f,active){
    const mb=moonBonus(f);
    const MONTHS_SHORT=['ינ','פב','מר','אפ','מא','יו','יל','אג','ספ','אק','נו','דצ'];
    const pills=MONTHS_SHORT.map((mn2,i)=>`<span class="sp ${f.seasons[i]?(i===m0?'cur':'on'):'off'}">${mn2}</span>`).join('');
    return`<div class="fc" style="border:1.5px solid ${active?f.color+'55':'var(--border)'};${active?'':'opacity:0.5'}">
      <div class="fc-head">
        <div><span style="font-size:20px">${f.icon}</span> <span class="fc-name" style="color:${active?f.color:'var(--muted)'}">${f.name}</span></div>
        <div><span class="fc-badge" style="background:${active?f.color+'22':'#ffffff08'};color:${active?f.color:'var(--muted)'};border:1px solid ${active?f.color+'44':'var(--border)'}">${active?'✅ בעונה':'לא בעונה'}</span></div>
      </div>
      <div class="season-pills">${pills}</div>
      ${mb?`<div style="background:${mb.good?'#f0b42915':'#ffffff08'};border-radius:5px;padding:5px 8px;font-size:10px;color:${mb.good?'#f0b429':'var(--muted)'};margin-bottom:6px">${mb.txt}</div>`:''}
      <div style="font-size:10px;color:var(--muted);margin-bottom:5px">${f.moonNote}</div>
      <div class="fc-grid">
        <div><span class="k">📅 עונה:</span> ${f.bestMonths}</div>
        <div><span class="k">📏 גודל:</span> ${f.size}</div>
        <div><span class="k">⚖️ מינימום:</span> <span style="color:#ff9800">${f.minLegal}</span></div>
        <div><span class="k">🌊 גלים:</span> ${Math.round(f.waveMin*100)}–${Math.round(f.waveMax*100)} ס"מ</div>
        <div><span class="k">💨 רוח:</span> ${f.windMin}–${f.windMax} קמ"ש</div>
        <div><span class="k">🔱 עומק:</span> ${f.depth}</div>
      </div>
      <div style="font-size:10px;margin-bottom:4px"><span style="color:var(--muted)">🪝 פיתיון:</span> ${f.bait}</div>
      <div style="font-size:10px;margin-bottom:4px"><span style="color:var(--muted)">🎣 שיטה:</span> ${f.method}</div>
      <div style="font-size:10px;margin-bottom:4px"><span style="color:var(--muted)">🪨 מבנה:</span> ${f.structure}</div>
      <div class="fc-tip" style="border-color:${f.color}">${f.tip}</div>
      ${f.warning?`<div style="background:#ff525215;border-radius:5px;padding:5px 8px;font-size:10px;color:#ff5252;margin-top:5px">${f.warning}</div>`:''}
    </div>`;
  }

  const inS=FISH.filter(f=>f.seasons[m0]);
  const offS=FISH.filter(f=>!f.seasons[m0]);
  const moonIco2=moonPct>85?'🌕':moonPct>60?'🌔':moonPct>35?'🌓':moonPct>10?'🌒':'🌑';

  document.getElementById('content-fish').innerHTML=`
  <div class="sec">
    <div class="sec-t">🐟 דגי ${MONTH_NAMES[m0]} – ${beach.name}</div>
    <div style="background:var(--bg3);border:1px solid var(--cborder);border-radius:7px;padding:9px 11px;margin-bottom:11px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:12px">
        <span style="color:var(--muted)">חודש:</span> <strong style="color:var(--gold)">${MONTH_NAMES[m0]}</strong><br>
        <span style="color:var(--muted)">בעונה:</span> <strong style="color:var(--green)">${inS.length} מ-${FISH.length} דגים</strong>
      </div>
      <div style="text-align:center"><div style="font-size:24px">${moonIco2}</div>
      <div style="font-size:10px;color:var(--gold)">ירח ${moonPct}%</div></div>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:7px">✅ בעונה (${inS.length} דגים)</div>
    ${inS.map(f=>fishCard(f,true)).join('')}
    ${offS.length?`<div style="font-size:12px;font-weight:700;color:var(--muted);margin:12px 0 7px">⏳ לא בעונה (${offS.length} דגים)</div>${offS.map(f=>fishCard(f,false)).join('')}`:''}
    <div style="font-size:9px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.5">
      מקורות: ויקיפדיה דיג בישראל, dayag.co.il, mafish.org.il, FishBase, NOAA<br>
      ⚖️ חוק: עד 5 ק"ג או 2 דגים גדולים ביום לדייג ספורט
    </div>
  </div>`;
}

// ── INFO TAB ─────────────────────────────────────────────

    <div class="ir"><div class="ik">💧 טמפ' מים (SST לוויין)</div><div class="iv" style="color:var(--cyan)">${cSST!=null?Math.round(cSST*10)/10+'°C':'N/A'}</div></div>
    <div class="ir"><div class="ik">🌊 גלים עכשיו</div><div class="iv">${Math.round(cWave*100)} ס"מ – ${wvTxt(cWave)}</div></div>
    <div class="ir"><div class="ik">💨 רוח עכשיו</div><div class="iv">${cWind} קמ"ש ${wDir(cDir)}</div></div>
    <div class="ir"><div class="ik">🌡️ אוויר</div><div class="iv">${cTemp}°C</div></div>
    <div class="ir"><div class="ik">🔵 לחץ</div><div class="iv">${cPres} hPa</div></div>
    <div class="ir"><div class="ik">⏱ תקופת גל</div><div class="iv">${Math.round(cPer)} שניות</div></div>
    <div class="ir"><div class="ik">☀️ זריחה</div><div class="iv">${sc2.sunrise}</div></div>
    <div class="ir"><div class="ik">🌆 שקיעה</div><div class="iv">${sc2.sunset}</div></div>
    <div class="ir"><div class="ik">🌙 ירח</div><div class="iv">${moonIco} ${moonPhase} – ${moonPct}%</div></div>
    <div class="ir"><div class="ik">🎣 ציון דיג</div><div class="iv" style="color:${scoreLabel(cScore).color}">${cScore}/100 – ${scoreLabel(cScore).text}</div></div>
    <div style="margin-top:10px"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">🐟 דגי מטרה:</div>
    <div class="fish-list">${beach.fish.map(f=>`<span class="tag">🐟 ${f}</span>`).join('')}</div></div>
    <div style="margin-top:10px;background:var(--bg3);border-right:3px solid var(--gold);border-radius:0 7px 7px 0;padding:9px 11px;font-size:11px;line-height:1.6">
      <strong style="color:var(--gold)">💡 טיפ:</strong> ${beach.tip}
    </div>
    <a href="https://www.google.com/maps?q=${beach.lat},${beach.lon}" target="_blank"
       style="display:block;margin-top:10px;background:var(--bg3);border:1px solid var(--cborder);border-radius:7px;padding:11px;text-align:center;color:var(--cyan);text-decoration:none;font-weight:700">
      🗺️ ניווט לחוף ב-Google Maps
    </a>
    <div style="margin-top:7px;font-size:9px;color:var(--muted);text-align:center;line-height:1.5">
      נתוני אוויר: Open-Meteo Forecast API<br>
      נתוני ים (גלים + סוואל + SST): Open-Meteo Marine API (MeteoFrance + ECMWF)
    </div>
  </div>`;
}
